name: CI

# Lint and test the backend on every push and pull request.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          # Tests run without a database; these keep config assertions happy if reached.
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
