# Render Blueprint for the HomeLog backend.
# Deploy: push to GitHub, then in Render → "New +" → "Blueprint" → pick this repo.
# Render auto-detects this file. Set the `sync: false` secrets in the dashboard.
services:
  - type: web
    name: homelog-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES
        value: 7d
      - key: SUPABASE_BUCKET
        value: homelog-uploads
      # Auto-generated strong secret for signing JWTs.
      - key: JWT_SECRET
        generateValue: true
      # Set these in the Render dashboard (kept out of source control):
      - key: MONGO_URI # your MongoDB Atlas connection string
        sync: false
      - key: CORS_ORIGIN # allowed origins for the API (e.g. your app/web origin)
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
